<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – Study Material Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      height: 100vh; display: flex; justify-content: center; align-items: center;
      background: linear-gradient(135deg, #1e2a38, #2c3e50);
      overflow: hidden; position: relative;
    }
    .blob { position: absolute; width: 320px; height: 320px; border-radius: 50%;
      filter: blur(130px); opacity: 0.35; pointer-events: none; }
    .blob1 { background: #3498db; top: -80px; left: -80px; }
    .blob2 { background: #1abc9c; bottom: -80px; right: -80px; }
    .card {
      background: rgba(255,255,255,0.97); padding: 40px 35px;
      border-radius: 16px; width: 360px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25); text-align: center; z-index: 1;
    }
    .card h2 { margin-bottom: 8px; color: #2c3e50; font-size: 24px; }
    .card p.sub { color: #777; font-size: 14px; margin-bottom: 24px; }
    .field { text-align: left; margin-top: 14px; }
    .field label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: 600; }
    .field input {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1.5px solid #ddd; font-size: 14px; transition: border 0.2s; outline: none;
    }
    .field input:focus { border-color: #3498db; }
    button[type="submit"] {
      width: 100%; padding: 11px; margin-top: 22px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white; font-weight: bold; font-size: 15px; cursor: pointer; transition: opacity 0.2s;
    }
    button[type="submit"]:hover  { opacity: 0.88; }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }
    #message { margin-top: 14px; font-size: 13px; min-height: 18px; }
    .error   { color: #e74c3c; }
    .success { color: #27ae60; }
    .go-login {
      display: inline-block; margin-top: 10px; padding: 9px 22px;
      background: #1abc9c; color: white; border-radius: 7px;
      text-decoration: none; font-weight: bold; font-size: 14px; transition: opacity 0.2s;
    }
    .go-login:hover { opacity: 0.85; }
    .link { margin-top: 18px; display: block; color: #3498db; text-decoration: none; font-size: 13px; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="card">
  <h2>Create Account ✨</h2>
  <p class="sub">Join Study Material Manager</p>
  <form id="signupForm">
    <div class="field">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Your full name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
    </div>
    <button type="submit" id="signupBtn">Sign Up</button>
  </form>
  <div id="message"></div>
  <a class="link" href="login.html">Already have an account? Login</a>
</div>
<script>
  // Redirect if already logged in
  if (localStorage.getItem("token")) window.location.href = "index.html";

  const form      = document.getElementById("signupForm");
  const msgEl     = document.getElementById("message");
  const signupBtn = document.getElementById("signupBtn");

  function showMsg(html, type) { msgEl.innerHTML = html; msgEl.className = type; }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    signupBtn.disabled = true;
    signupBtn.textContent = "Creating account…";
    showMsg("", "");

    try {
      // ✅ Relative URL
      const res  = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name:     document.getElementById("name").value.trim(),
          email:    document.getElementById("email").value.trim(),
          password: document.getElementById("password").value
        })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg(
          `${data.message}<br><br><a class="go-login" href="login.html">Go to Login →</a>`,
          "success"
        );
        form.reset();
      } else {
        showMsg(data.message || "Signup failed ❌", "error");
        signupBtn.disabled = false;
        signupBtn.textContent = "Sign Up";
      }
    } catch (err) {
      showMsg("Server waking up... please wait ⏳", "error");
      signupBtn.disabled = false;
      signupBtn.textContent = "Sign Up";
    }
  });
</script>
</body>
</html>
