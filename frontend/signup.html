<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e2a38, #2c3e50);
      overflow: hidden;
      position: relative;
    }

    /* BLOBS */
    .blob {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
    }

    .blob1 {
      background: #3498db;
      top: -50px;
      left: -50px;
    }

    .blob2 {
      background: #1abc9c;
      bottom: -50px;
      right: -50px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.95);
      padding: 35px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      z-index: 1;
    }

    h2 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border-radius: 6px;
      border: none;
      background: #3498db;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2980b9;
    }

    #message {
      margin-top: 10px;
      color: green;
    }

    .link {
      margin-top: 15px;
      display: block;
      color: #3498db;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
  <h2>Create Account ✨</h2>

  <form id="signupForm">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Sign Up</button>
  </form>

  <p id="message"></p>

  <a class="link" href="login.html">Already have an account? Login</a>
</div>

<script>
  const form = document.getElementById("signupForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(form);

    const dataObj = {
      name: formData.get("name"),
      email: formData.get("email"),
      password: formData.get("password")
    };

    const res = await fetch("http://localhost:5000/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(dataObj)
    });

    const data = await res.json();

    document.getElementById("message").innerText = data.message;
  });
</script>

</body>
</html>
