<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Study Material Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e2a38, #2c3e50);
      overflow: hidden;
      position: relative;
    }

    .blob {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.35;
      pointer-events: none;
    }
    .blob1 { background: #1abc9c; top: -80px; left: -80px; }
    .blob2 { background: #3498db; bottom: -80px; right: -80px; }

    .card {
      background: rgba(255,255,255,0.97);
      padding: 40px 35px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      text-align: center;
      z-index: 1;
    }

    .card h2 {
      margin-bottom: 8px;
      color: #2c3e50;
      font-size: 24px;
    }

    .card p.sub {
      color: #777;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .field {
      text-align: left;
      margin-top: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1.5px solid #ddd;
      font-size: 14px;
      transition: border 0.2s;
      outline: none;
    }

    .field input:focus {
      border-color: #1abc9c;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      margin-top: 22px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #1abc9c, #16a085);
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }

    #message {
      margin-top: 14px;
      font-size: 13px;
      min-height: 18px;
    }
    .error  { color: #e74c3c; }
    .success { color: #27ae60; }

    .link {
      margin-top: 18px;
      display: block;
      color: #3498db;
      text-decoration: none;
      font-size: 13px;
    }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
  <h2>Welcome Back 👋</h2>
  <p class="sub">Login to your account</p>

  <form id="loginForm">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
    </div>

    <button type="submit" id="loginBtn">Login</button>
  </form>

  <p id="message"></p>

  <a class="link" href="signup.html">Don't have an account? Sign up</a>
</div>

<script>
  // ── Redirect if already logged in ──────────────────────────────────────────
  if (localStorage.getItem("token")) {
    window.location.href = "index.html";
  }

  const form    = document.getElementById("loginForm");
  const msgEl   = document.getElementById("message");
  const loginBtn = document.getElementById("loginBtn");

  function showMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className   = type; // "error" or "success"
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in…";
    showMsg("", "");

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res  = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        // ── Store auth data ─────────────────────────────────────────────────
        localStorage.setItem("token",     data.token);
        localStorage.setItem("userName",  data.name  || "User");
        localStorage.setItem("userEmail", data.email || "");

        showMsg("Login successful! Redirecting…", "success");
        setTimeout(() => { window.location.href = "index.html"; }, 600);
      } else {
        showMsg(data.message || "Login failed ❌", "error");
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }

    } catch (err) {
      showMsg("Server waking up... please wait ⏳", "error");
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }
  });
</script>

</body>
</html>
