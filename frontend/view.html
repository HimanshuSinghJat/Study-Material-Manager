<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Materials – Study Material Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f0f2f5; }

    /* SIDEBAR */
    .sidebar { width: 230px; min-height: 100vh; background: #1e2a38; color: white; padding: 28px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
    .logo { font-size: 18px; font-weight: 700; margin-bottom: 36px; line-height: 1.4; }
    .menu a { display: flex; align-items: center; gap: 10px; color: #bdc3c7; margin: 10px 0; text-decoration: none; padding: 9px 12px; border-radius: 8px; font-size: 14px; transition: background 0.2s, color 0.2s; }
    .menu a:hover, .menu a.active { background: rgba(255,255,255,0.1); color: white; }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; padding: 30px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    #pageTitle { font-size: 22px; color: #2c3e50; font-weight: 700; }

    /* BACK BTN */
    #backBtn { display: none; align-items: center; gap: 6px; background: #eaf0fb; color: #3498db; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin-bottom: 18px; transition: background 0.2s; }
    #backBtn:hover { background: #d6e6f8; }

    /* AVATAR */
    .user-box { position: relative; }
    #avatar { width: 42px; height: 42px; background: linear-gradient(135deg, #3498db, #2980b9); color: white; font-weight: 700; font-size: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: transform 0.15s; }
    #avatar:hover { transform: scale(1.08); }
    .dropdown { display: none; position: absolute; right: 0; top: 52px; background: white; padding: 14px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); width: 210px; z-index: 999; }
    .dropdown.open { display: block; }
    .dropdown p { font-size: 13px; color: #555; margin: 4px 0; word-break: break-all; }
    .dropdown p strong { color: #2c3e50; }
    .dropdown hr { margin: 10px 0; border: none; border-top: 1px solid #eee; }
    .dropdown button { width: 100%; margin-top: 6px; padding: 8px; border: none; background: #f5f5f5; cursor: pointer; border-radius: 6px; font-size: 13px; transition: background 0.2s; }
    .dropdown button:hover { background: #e8e8e8; }
    .dropdown .logout-btn { background: #fdecea; color: #e74c3c; font-weight: 600; }
    .dropdown .logout-btn:hover { background: #fbd7d4; }

    /* ROWS */
    .row { display: flex; justify-content: space-between; align-items: center; background: white; padding: 14px 18px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); transition: transform 0.15s, box-shadow 0.15s; }
    .row:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
    .row-left { display: flex; align-items: center; gap: 10px; font-size: 15px; color: #2c3e50; }
    .row-left .icon { font-size: 20px; }
    .row-left .meta { display: flex; flex-direction: column; }
    .row-left .meta .subject { font-size: 12px; color: #888; }
    .row-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .row-right a, .row-right button { padding: 6px 13px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.2s; }
    .row-right a:hover, .row-right button:hover { opacity: 0.82; }
    .open-btn     { background: #3498db; color: white; }
    .download-btn { background: #2ecc71; color: white; }
    .delete-btn   { background: #e74c3c; color: white; }

    /* EMPTY / LOADING */
    .empty { text-align: center; margin-top: 60px; color: #aaa; }
    .empty .icon { font-size: 52px; margin-bottom: 12px; }
    .empty p { font-size: 16px; }
    .loading { text-align: center; margin-top: 60px; color: #aaa; font-size: 16px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">📚 Study Material<br>Manager</div>
  <div class="menu">
    <a href="index.html">📤 Upload</a>
    <a href="view.html" class="active">📂 View Materials</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <span id="pageTitle">All Study Materials</span>
    <div class="user-box">
      <div id="avatar" onclick="toggleMenu(event)"></div>
      <div id="dropdown" class="dropdown">
        <p><strong id="userName"></strong></p>
        <p id="userEmail"></p>
        <hr>
        <button onclick="showProfile()">👤 Profile</button>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </div>

  <button id="backBtn" onclick="showFolders()">⬅ Back to folders</button>
  <div id="content"><div class="loading">Loading…</div></div>
</div>

<script>
  // ── Auth guard ──────────────────────────────────────────────────────────────
  const token = localStorage.getItem("token");
  if (!token) window.location.href = "login.html";

  // ── User info ───────────────────────────────────────────────────────────────
  const userName  = localStorage.getItem("userName")  || "User";
  const userEmail = localStorage.getItem("userEmail") || "";
  document.getElementById("avatar").textContent    = userName.charAt(0).toUpperCase();
  document.getElementById("userName").textContent  = userName;
  document.getElementById("userEmail").textContent = userEmail;

  // ── Dropdown ────────────────────────────────────────────────────────────────
  function toggleMenu(e) { e.stopPropagation(); document.getElementById("dropdown").classList.toggle("open"); }
  document.addEventListener("click", () => document.getElementById("dropdown").classList.remove("open"));
  function logout()      { localStorage.clear(); window.location.href = "login.html"; }
  function showProfile() { alert(`Name: ${userName}\nEmail: ${userEmail}`); }

  // ── State ───────────────────────────────────────────────────────────────────
  let allData = [];

  function handleUnauthorized() { alert("Session expired. Please login again."); localStorage.clear(); window.location.href = "login.html"; }

  // ── Load all materials ──────────────────────────────────────────────────────
  async function loadData() {
    document.getElementById("content").innerHTML = '<div class="loading">Loading…</div>';
    try {
      // ✅ Relative URL
      const res = await fetch("/materials", { headers: { "Authorization": token } });
      if (res.status === 401) { handleUnauthorized(); return; }
      if (!res.ok) { document.getElementById("content").innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Failed to load materials</p></div>'; return; }
      allData = await res.json();
      showFolders();
    } catch (err) {
      console.error("loadData error:", err);
      document.getElementById("content").innerHTML = '<div class="empty"><div class="icon">🔌</div><p>Cannot reach server</p></div>';
    }
  }

  // ── Show folders ─────────────────────────────────────────────────────────────
  function showFolders() {
    document.getElementById("pageTitle").textContent = "All Study Materials";
    document.getElementById("backBtn").style.display = "none";
    const container = document.getElementById("content");
    container.innerHTML = "";

    // Folder entries: fileUrl is "" / null / undefined
    const folderNames = [...new Set(
      allData
        .filter(item => item.fileUrl === "" || item.fileUrl === null || item.fileUrl === undefined)
        .map(item => item.folder)
        .filter(Boolean)
    )];

    if (folderNames.length === 0) {
      container.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No folders yet. Go to Upload to create one.</p></div>';
      return;
    }

    folderNames.forEach(folder => {
      const fileCount = allData.filter(item => item.folder === folder && item.fileUrl && item.fileUrl !== "").length;
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="row-left">
          <span class="icon">📁</span>
          <div class="meta">
            <strong>${escapeHtml(folder)}</strong>
            <span class="subject">${fileCount} file${fileCount !== 1 ? "s" : ""}</span>
          </div>
        </div>
        <div class="row-right">
          <button class="open-btn"   onclick="openFolder('${escapeAttr(folder)}')">Open</button>
          <button class="delete-btn" onclick="deleteFolder('${escapeAttr(folder)}')">Delete</button>
        </div>`;
      container.appendChild(row);
    });
  }

  // ── Open folder ──────────────────────────────────────────────────────────────
  function openFolder(folder) {
    document.getElementById("pageTitle").textContent = "📁 " + folder;
    document.getElementById("backBtn").style.display = "flex";
    const container = document.getElementById("content");
    container.innerHTML = "";

    const files = allData.filter(item => item.folder === folder && item.fileUrl && item.fileUrl !== "");

    if (files.length === 0) {
      container.innerHTML = '<div class="empty"><div class="icon">📄</div><p>No files in this folder yet.</p></div>';
      return;
    }

    files.forEach(file => {
      // fileUrl may be a full Cloudinary https:// URL or a relative /uploads/xxx path
      const isFullUrl = file.fileUrl.startsWith("http");
      const openUrl   = isFullUrl ? file.fileUrl : `${window.location.origin}${file.fileUrl}`;

      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="row-left">
          <span class="icon">📄</span>
          <div class="meta">
            <strong>${escapeHtml(file.title)}</strong>
            <span class="subject">${escapeHtml(file.subject)}</span>
          </div>
        </div>
        <div class="row-right">
          <a class="open-btn"     href="${openUrl}" target="_blank">Open</a>
          <a class="download-btn" href="${openUrl}" download>Download</a>
          <button class="delete-btn" onclick="deleteMaterial('${file._id}','${escapeAttr(folder)}')">Delete</button>
        </div>`;
      container.appendChild(row);
    });
  }

  // ── Delete single file ───────────────────────────────────────────────────────
  async function deleteMaterial(id, currentFolder) {
    if (!confirm("Delete this file?")) return;
    try {
      // ✅ Relative URL
      const res = await fetch(`/materials/${id}`, { method: "DELETE", headers: { "Authorization": token } });
      if (res.status === 401) { handleUnauthorized(); return; }
      if (res.ok) { allData = allData.filter(item => item._id !== id); openFolder(currentFolder); }
      else { const d = await res.json(); alert(d.message || "Delete failed ❌"); }
    } catch (err) { alert("Error deleting file ❌"); console.error(err); }
  }

  // ── Delete entire folder ─────────────────────────────────────────────────────
  async function deleteFolder(folder) {
    const items = allData.filter(item => item.folder === folder);
    if (!confirm(`Delete folder "${folder}" and all its files?`)) return;
    for (const item of items) {
      try {
        // ✅ Relative URL
        const res = await fetch(`/materials/${item._id}`, { method: "DELETE", headers: { "Authorization": token } });
        if (res.status === 401) { handleUnauthorized(); return; }
      } catch (err) { console.error("Error deleting item:", item._id, err); }
    }
    await loadData();
  }

  // ── XSS helpers ──────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function escapeAttr(str) { return String(str).replace(/'/g,"\\'"); }

  loadData();
</script>
</body>
</html>
