<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Materials – Study Material Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #f0f2f5;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────────────── */
    .sidebar {
      width: 230px;
      min-height: 100vh;
      background: #1e2a38;
      color: white;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 36px;
      line-height: 1.4;
    }

    .menu a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #bdc3c7;
      margin: 10px 0;
      text-decoration: none;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 14px;
      transition: background 0.2s, color 0.2s;
    }

    .menu a:hover,
    .menu a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    /* ── MAIN ────────────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }

    /* ── TOPBAR ──────────────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    #pageTitle {
      font-size: 22px;
      color: #2c3e50;
      font-weight: 700;
    }

    /* ── BACK BUTTON ─────────────────────────────────────────────────────── */
    #backBtn {
      display: none;
      align-items: center;
      gap: 6px;
      background: #eaf0fb;
      color: #3498db;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 18px;
      transition: background 0.2s;
    }

    #backBtn:hover { background: #d6e6f8; }

    /* ── AVATAR / DROPDOWN ───────────────────────────────────────────────── */
    .user-box { position: relative; }

    #avatar {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      font-weight: 700;
      font-size: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s;
    }

    #avatar:hover { transform: scale(1.08); }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 52px;
      background: white;
      padding: 14px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      width: 210px;
      z-index: 999;
    }

    .dropdown.open { display: block; }

    .dropdown p {
      font-size: 13px;
      color: #555;
      margin: 4px 0;
      word-break: break-all;
    }

    .dropdown p strong { color: #2c3e50; }
    .dropdown hr { margin: 10px 0; border: none; border-top: 1px solid #eee; }

    .dropdown button {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border: none;
      background: #f5f5f5;
      cursor: pointer;
      border-radius: 6px;
      font-size: 13px;
      transition: background 0.2s;
    }

    .dropdown button:hover { background: #e8e8e8; }

    .dropdown .logout-btn {
      background: #fdecea;
      color: #e74c3c;
      font-weight: 600;
    }

    .dropdown .logout-btn:hover { background: #fbd7d4; }

    /* ── CONTENT AREA ────────────────────────────────────────────────────── */
    #content { margin-top: 4px; }

    /* ── ITEM ROW ────────────────────────────────────────────────────────── */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 14px 18px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .row:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    .row-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: #2c3e50;
    }

    .row-left span.icon { font-size: 20px; }

    .row-left .meta {
      display: flex;
      flex-direction: column;
    }

    .row-left .meta .subject {
      font-size: 12px;
      color: #888;
    }

    .row-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .row-right a,
    .row-right button {
      padding: 6px 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .row-right a:hover,
    .row-right button:hover { opacity: 0.82; }

    .open-btn     { background: #3498db;  color: white; }
    .download-btn { background: #2ecc71;  color: white; }
    .delete-btn   { background: #e74c3c;  color: white; }

    /* ── EMPTY STATE ─────────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      margin-top: 60px;
      color: #aaa;
    }

    .empty .icon { font-size: 52px; margin-bottom: 12px; }
    .empty p     { font-size: 16px; }

    /* ── LOADING ─────────────────────────────────────────────────────────── */
    .loading {
      text-align: center;
      margin-top: 60px;
      color: #aaa;
      font-size: 16px;
    }
  </style>
</head>

<body>

<!-- ── SIDEBAR ───────────────────────────────────────────────────────────── -->
<div class="sidebar">
  <div class="logo">📚 Study Material<br>Manager</div>
  <div class="menu">
    <a href="index.html">📤 Upload</a>
    <a href="view.html" class="active">📂 View Materials</a>
  </div>
</div>

<!-- ── MAIN ──────────────────────────────────────────────────────────────── -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <span id="pageTitle">All Study Materials</span>

    <div class="user-box">
      <div id="avatar" onclick="toggleMenu(event)"></div>

      <div id="dropdown" class="dropdown">
        <p><strong id="userName"></strong></p>
        <p id="userEmail"></p>
        <hr>
        <button onclick="showProfile()">👤 Profile</button>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </div>

  <!-- Back button (shown inside a folder) -->
  <button id="backBtn" onclick="showFolders()">⬅ Back to folders</button>

  <!-- Content area -->
  <div id="content">
    <div class="loading">Loading…</div>
  </div>

</div>

<script>
  const BASE_URL = "https://study-material-manager.onrender.com";

  const token = localStorage.getItem("token");
  if (!token) window.location.href = "login.html";

  function handleUnauthorized() {
    alert("Session expired. Please login again.");
    localStorage.clear();
    window.location.href = "login.html";
  }

  // ── LOAD DATA ───────────────────────────────────────
  async function loadData() {
    try {
      const res = await fetch(`${BASE_URL}/materials`, {
        headers: { Authorization: token }
      });

      if (res.status === 401) return handleUnauthorized();

      const data = await res.json();

      const container = document.getElementById("materials");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = "<p>No materials found</p>";
        return;
      }

      // Group by folder
      const folders = {};

      data.forEach(item => {
        if (!folders[item.folder]) {
          folders[item.folder] = [];
        }
        folders[item.folder].push(item);
      });

      // Render folders
      Object.keys(folders).forEach(folder => {
        const folderDiv = document.createElement("div");
        folderDiv.innerHTML = `<h3>${folder}</h3>`;

        folders[folder].forEach(item => {
          if (!item.fileUrl) return; // skip folder placeholder

          const file = document.createElement("div");

          file.innerHTML = `
            <p>${item.title}</p>
            <a href="${BASE_URL}${item.fileUrl}" target="_blank">View</a>
            <button onclick="deleteMaterial('${item._id}')">Delete</button>
          `;

          folderDiv.appendChild(file);
        });

        container.appendChild(folderDiv);
      });

    } catch (err) {
      console.error(err);
    }
  }

  loadData();

  // ── DELETE FILE ─────────────────────────────────────
  async function deleteMaterial(id) {
    if (!confirm("Delete this file?")) return;

    try {
      const res = await fetch(`${BASE_URL}/materials/${id}`, {
        method: "DELETE",
        headers: { Authorization: token }
      });

      if (res.status === 401) return handleUnauthorized();

      const data = await res.json();
      alert(data.message);

      loadData();

    } catch (err) {
      console.error(err);
    }
  }
</script>


</body>
</html>
